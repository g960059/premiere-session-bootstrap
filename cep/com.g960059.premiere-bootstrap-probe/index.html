<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Premiere Bootstrap Probe</title>
    <style>
      body {
        margin: 16px;
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #262626;
        color: #f2f2f2;
      }
      button {
        padding: 8px 12px;
        margin-right: 8px;
      }

        white-space: pre-wrap;
